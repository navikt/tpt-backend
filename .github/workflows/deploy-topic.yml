name: Deploy kafka topic & manager
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".nais/topic.yaml"
jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: nais/deploy/actions/deploy@823ec9b7e305ce7cf911d0f9a25f7da9d7486cf2
        env:
          RESOURCE: .nais/topic.yaml,.nais/kafka-manager.yaml
          CLUSTER: prod-gcp
