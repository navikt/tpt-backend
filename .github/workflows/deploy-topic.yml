name: Deploy kafka topic & manager
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".nais/topic.yaml"
jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb
        env:
          RESOURCE: .nais/topic.yaml,.nais/kafka-manager.yaml
          CLUSTER: prod-gcp
