name: Deploy kafka topic & manager
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".nais/topic.yaml"
jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7
        env:
          RESOURCE: .nais/topic.yaml,.nais/kafka-manager.yaml
          CLUSTER: prod-gcp
