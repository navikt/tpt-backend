name: Deploy kafka topic & manager
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".nais/topic.yaml"
jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb
        env:
          RESOURCE: .nais/topic.yaml,.nais/kafka-manager.yaml
          CLUSTER: prod-gcp
